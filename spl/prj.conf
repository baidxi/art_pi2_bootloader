# ========================================
# SPL (Stage 1) - 最小化配置
# ========================================

# 堆栈和堆内存配置
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=393216

# 最小化 libc
CONFIG_MINIMAL_LIBC=y
CONFIG_STDOUT_CONSOLE=y

# 串口配置
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=n

# GPIO 配置
CONFIG_GPIO=y

# 内部 Flash 配置
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y

# 关闭日志系统
# CONFIG_LOG is not set

# 关闭 Shell
# CONFIG_SHELL is not set

# 启动配置
CONFIG_BOOT_DELAY=0

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y

# CRC 支持（用于固件头校验）
CONFIG_CRC=y
CONFIG_CRC32_IEEE=y

# 关断其他不需要的功能
CONFIG_REBOOT=y

# 直接写入 Flash 模式（通过 Kconfig 启用）
# 启用后 YModem 数据不再经过 RAM 缓冲，直接写入 Flash
# 可节省 ~256KB 堆内存（TPL 场景），但要求 Flash 先擦除后写入
CONFIG_SPL_DIRECT_FLASH_WRITE=y
# CONFIG_USB_CDC_ACM=y