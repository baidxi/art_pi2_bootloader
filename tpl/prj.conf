CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=65536

CONFIG_STDOUT_CONSOLE=y

CONFIG_SERIAL=y
CONFIG_UART_STM32=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_STM32_XSPI=y
CONFIG_STM32_MEMMAP=y
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_FLASH_BASE_ADDRESS=0x70000000

CONFIG_LOG=y

# 使用内存缓冲日志，避免串口输出延迟影响 USB 枚举时序
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PROCESS_THREAD=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024
CONFIG_LOG_BUFFER_SIZE=65536
CONFIG_LOG_PRINTK=y
CONFIG_SHELL=y
CONFIG_CRC=y
CONFIG_REBOOT=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USBD_FASTBOOT_CLASS=y
CONFIG_USBD_FASTBOOT_DOWNLOAD_BUF_SIZE=32768
CONFIG_USBD_FASTBOOTD=y
# CONFIG_UDC_STM32_CLOCK_CHECK is not set

# Increase UDC buffer pool to prevent buffer exhaustion
CONFIG_UDC_BUF_COUNT=32
CONFIG_UDC_BUF_POOL_SIZE=2048

# Increase UDC STM32 message queue size to prevent message loss
# during interrupt bursts (e.g., TXFE storm on short packet echo)
CONFIG_UDC_STM32_MAX_QMESSAGES=32

# Enable CDC ACM dedicated buffer pool
CONFIG_USBD_CDC_ACM_BUF_POOL=y

# Increase USB device core message queue size (default 10)
# Prevents event loss when multiple UDC events are queued rapidly
CONFIG_USBD_MAX_UDC_MSG=20

CONFIG_USBD_COMPOSITE_DEVICE=y

CONFIG_USBD_SHELL=y