CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=65536

CONFIG_STDOUT_CONSOLE=y

CONFIG_SERIAL=y
CONFIG_UART_STM32=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_STM32_XSPI=y
CONFIG_STM32_MEMMAP=y
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_FLASH_BASE_ADDRESS=0x70000000

CONFIG_LOG=y

# 使用内存缓冲日志，避免串口输出延迟影响 USB 枚举时序
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PROCESS_THREAD=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024
CONFIG_LOG_BUFFER_SIZE=65536
CONFIG_LOG_PRINTK=y
CONFIG_SHELL=y
CONFIG_CRC=y
CONFIG_REBOOT=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_UDC_DRIVER=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USB_CDC_ACM=y
CONFIG_USBD_SHELL=y

# USB 调试日志
CONFIG_USBD_LOG_LEVEL_INF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_INF=y
CONFIG_STM32_USB_COMMON_LOG_LEVEL_INF=y
CONFIG_USB_DEVICE_LOG_LEVEL_INF=y

# CONFIG_UDC_STM32_CLOCK_CHECK is not set

CONFIG_UDC_DRIVER_LOG_LEVEL_DBG=y
CONFIG_USBD_LOG_LEVEL_DBG=y

